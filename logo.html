<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Logo ARKEDIA 3D - Preview</title>
    <style>
        body {
            background-color: #0A192F; /* Fond Bleu Nuit */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }
        
        .logo-container {
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- DÉBUT DU LOGO SVG -->
        <svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Définition des filtres (Lueur Néon) -->
            <defs>
                <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <linearGradient id="laser-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="rgba(0, 245, 255, 0)" />
                    <stop offset="50%" stop-color="#00F5FF" />
                    <stop offset="100%" stop-color="rgba(0, 245, 255, 0)" />
                </linearGradient>
            </defs>

            <!-- Nuage de points (LiDAR Effect) - Arrière plan -->
            <g id="lidar-points" fill="#00F5FF" opacity="0.3">
                <circle cx="200" cy="50" r="1.5" /> <circle cx="220" cy="55" r="1.5" />
                <circle cx="180" cy="55" r="1.5" /> <circle cx="240" cy="70" r="1.5" />
                <circle cx="160" cy="70" r="1.5" /> <circle cx="250" cy="90" r="1.5" />
                <circle cx="150" cy="90" r="1.5" /> <circle cx="260" cy="110" r="1.5" />
                <circle cx="140" cy="110" r="1.5" /> <circle cx="200" cy="40" r="1" />
                <circle cx="210" cy="30" r="1" /> <circle cx="190" cy="30" r="1" />
            </g>

            <!-- La Lettre A (Structure) -->
            <!-- Forme stylisée d'un A solide -->
            <path d="M200 40 L280 200 H240 L200 120 L160 200 H120 L200 40Z" fill="#112240" stroke="#00F5FF" stroke-width="2"/>
            
            <!-- Le Faisceau Laser (Scan) -->
            <rect x="50" y="130" width="300" height="4" fill="url(#laser-gradient)" filter="url(#neon-glow)" />
            
            <!-- Texte ARKEDIA 3D -->
            <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" letter-spacing="4" fill="#CCD6F6">
                ARKEDIA <tspan fill="#00F5FF">3D</tspan>
            </text>
        </svg>
        <!-- FIN DU LOGO SVG -->
    </div>

</body>
</html>
