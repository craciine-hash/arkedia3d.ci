<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Fond Bleu Nuit (Optionnel : permet au laser de ressortir sur fond blanc) -->
    <rect width="512" height="512" rx="100" fill="#0A192F"/>

    <defs>
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="laser-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(0, 245, 255, 0)" />
            <stop offset="50%" stop-color="#00F5FF" />
            <stop offset="100%" stop-color="rgba(0, 245, 255, 0)" />
        </linearGradient>
    </defs>

    <!-- Groupe recentré et agrandi pour le format carré -->
    <g transform="translate(56, 106) scale(1.0)">
        
        <!-- Nuage de points (LiDAR Effect) -->
        <g id="lidar-points" fill="#00F5FF" opacity="0.5">
            <circle cx="200" cy="50" r="3" /> <circle cx="220" cy="55" r="3" />
            <circle cx="180" cy="55" r="3" /> <circle cx="240" cy="70" r="3" />
            <circle cx="160" cy="70" r="3" /> <circle cx="250" cy="90" r="3" />
            <circle cx="150" cy="90" r="3" /> <circle cx="260" cy="110" r="3" />
            <circle cx="140" cy="110" r="3" /> <circle cx="200" cy="40" r="2" />
            <circle cx="210" cy="30" r="2" /> <circle cx="190" cy="30" r="2" />
        </g>

        <!-- La Lettre A (Structure) -->
        <path d="M200 40 L280 200 H240 L200 120 L160 200 H120 L200 40Z" fill="#112240" stroke="#00F5FF" stroke-width="4"/>
        
        <!-- Le Faisceau Laser (Scan) -->
        <rect x="50" y="130" width="300" height="8" fill="url(#laser-gradient)" filter="url(#neon-glow)" />
    </g>
</svg>